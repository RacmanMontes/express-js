<!DOCTYPE html>
<html>
<head>
    <title>Upload Product Images</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
        .product { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; }
        img { max-width: 100px; margin-top: 10px; }
        input[type="file"] { margin: 10px 0; }
        button { background: #4CAF50; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Upload Product Images</h1>
    <div id="products"></div>

    <script>
        const API_URL = 'https://express-js-dtzo.onrender.com/api';
        
        async function loadProducts() {
            const response = await fetch(`${API_URL}/products?limit=20`);
            const data = await response.json();
            displayProducts(data);
        }
        
        function displayProducts(products) {
            const container = document.getElementById('products');
            container.innerHTML = products.map(product => `
                <div class="product">
                    <h3>${product.name}</h3>
                    <p>ID: ${product.id}</p>
                    <div id="preview-${product.id}">
                        ${product.image_urls?.[0] ? `<img src="${product.image_urls[0]}" onerror="this.src='https://placehold.co/300x300?text=No+Image'">` : '<p>No image</p>'}
                    </div>
                    <input type="file" id="file-${product.id}" accept="image/*">
                    <button onclick="uploadImage(${product.id})">Upload Image</button>
                    <div id="status-${product.id}"></div>
                </div>
            `).join('');
        }
        
        async function uploadImage(productId) {
            const fileInput = document.getElementById(`file-${productId}`);
            const file = fileInput.files[0];
            const statusDiv = document.getElementById(`status-${productId}`);
            
            if (!file) {
                statusDiv.innerHTML = '<span class="error">Please select a file</span>';
                return;
            }
            
            statusDiv.innerHTML = '<span>Uploading...</span>';
            
            const formData = new FormData();
            formData.append('product_image', file);
            formData.append('product_id', productId);
            
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_URL}/upload/product-image`, {
                    method: 'POST',
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {},
                    body: formData
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    statusDiv.innerHTML = `<span class="success">✅ Uploaded! URL: ${result.imageUrl}</span>`;
                    // Update preview
                    const previewDiv = document.getElementById(`preview-${productId}`);
                    previewDiv.innerHTML = `<img src="${result.imageUrl}">`;
                } else {
                    statusDiv.innerHTML = `<span class="error">❌ Error: ${result.message}</span>`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<span class="error">❌ Upload failed: ${error.message}</span>`;
            }
        }
        
        loadProducts();
    </script>
</body>
</html>
